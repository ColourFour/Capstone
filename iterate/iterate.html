<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Iteration Process Demo</title>
  <link rel="stylesheet" href="iterate.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Iteration Process Visualization</h1>

    <div class="controls">
      <label>Initial Guess x₀:
        <input type="number" id="x0" value="1" step="0.1">
      </label>
      <label>Steps (K):
        <input type="number" id="steps" value="10" min="1" max="50">
      </label>
      <button onclick="runIteration()">Run</button>
    </div>

    <div class="chart-wrapper">
      <h2>Iteration vs Step</h2>
      <canvas id="iterChart"></canvas>
    </div>

    <div class="chart-wrapper">
      <h2>Cobweb Diagram (Fixed-Point)</h2>
      <canvas id="cobwebChart"></canvas>
    </div>
  </div>

  <script src="iterate.js"></script>
</body>
</html>
